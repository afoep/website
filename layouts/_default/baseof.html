<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Title }} | AFÖP</title>
    <link rel="icon" href="favicon.svg" />
    {{ $css := resources.Get "index.css" | minify }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}" />
  </head>
  <body>
    <header>
      <div class="container">
        <div id="logo-row">
          <img id="logo" src="/images/logo2x.png" width="246" height="80" />
        </div>
        <nav id="nav-row">
          <ul>
            {{ range site.Menus.main }}
            <li><a href="{{ .URL }}" {{ if ($.Page.IsMenuCurrent "main" .) }}class="active"{{ end }}>{{ .Name }}</a></li>
            {{ end }}
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <div class="container">{{ .Content }}</div>
    </main>
    <aside style="padding-inline: 60px">
      <div class="container">
        <ul id="carousel" class="carousel">
          {{ range site.Menus.partners }}
          <li>
            <a href="{{ .URL }}">
              <img src="{{ .Params.image }}" alt="{{ .Name }}">
            </a>
          </li>
          {{ end }}
        </ul>
      </div>
    </aside>
    <footer>
      <div class="container">
        <nav>
          <span>
            Akademischer Fachverein Österreichischer Pharmazeut_innen /
            Elisabethstraße 27, 8010 Graz / ZVR 405502824
          </span>
          <ul>
        </nav>
      </div>
    </footer>
  </body>
</html>
